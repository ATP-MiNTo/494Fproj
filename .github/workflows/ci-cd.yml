name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest
        run: |
          pytest --tb=short -v
      
      - name: Test result
        if: always()
        run: echo "Tests completed"
  
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t image-classifier:latest .
          docker save image-classifier:latest > image-classifier.tar
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image-classifier.tar
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          # Install huggingface_hub
          pip install huggingface_hub
          
          # Set up git for HF Spaces repo
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"
          
          # Clone HF Spaces repo (requires HF_TOKEN set in secrets)
          git clone https://huggingface.co/spaces/${{ env.HF_REPO }} hf-deploy
          cd hf-deploy
          
          # Copy files from source
          cp ../Dockerfile .
          cp -r ../app .
          cp -r ../model .
          cp ../requirements.txt .
          cp ../pytest.ini .
          
          # Commit and push
          git add .
          git commit -m "Auto-deploy: ${{ github.sha }}" || true
          git push https://oauth2:${{ env.HF_TOKEN }}@huggingface.co/spaces/${{ env.HF_REPO }}.git
        continue-on-error: true
